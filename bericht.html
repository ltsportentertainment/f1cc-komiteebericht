<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>F1CC Offizieller Komiteebericht</title>
<link href="https://fonts.googleapis.com/css2?family=Titillium+Web:wght@400;600;700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #d0d0d0;
  font-family: 'Titillium Web', sans-serif;
  color: #111;
}

/* ── LADESCREEN ── */
#ladescreen {
  position: fixed; inset: 0; background: #fff;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 14px; z-index: 999;
}
#ladescreen img { height: 55px; }
#lade-text { font-size: 12px; color: #888; letter-spacing: 3px; text-transform: uppercase; }
#lade-fehler { font-size: 12px; color: #c00; max-width: 400px; text-align: center; display: none; line-height: 1.5; }
.lade-spinner { width: 28px; height: 28px; border: 3px solid #ddd; border-top-color: #e10600; border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── SEITE ── */
.seite {
  width: 210mm;
  min-height: 297mm;
  margin: 0 auto 20px;
  background: #fff;
  box-shadow: 0 2px 16px rgba(0,0,0,0.18);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
}

/* ── KOPF: Logo zentriert, GP-Name darunter, Partner rechts ── */
.kopf {
  padding: 22px 28px 0;
  background: #fff;
  border-bottom: 2px solid #e10600;
  display: flex;
  flex-direction: column;
  align-items: center;
  position: relative;
}
.kopf-partner {
  position: absolute;
  top: 22px;
  right: 28px;
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 5px;
}
.kopf-partner img { height: 18px; object-fit: contain; }
.kopf-partner img:last-child { height: 13px; }

.kopf-logo { margin-bottom: 10px; }
.kopf-logo img { height: 50px; display: block; }
.kopf-gp {
  font-size: 22px;
  font-weight: 900;
  letter-spacing: 0.5px;
  color: #111;
  text-align: center;
}
.kopf-datum {
  font-size: 12px;
  color: #666;
  letter-spacing: 1px;
  margin-top: 2px;
  margin-bottom: 16px;
  text-align: center;
}

/* ── META-TABELLE (Vom / An / Dokument / Datum / Uhrzeit) ── */
.meta-table {
  margin: 20px 28px 0;
  border-top: 1px solid #111;
  border-bottom: 1px solid #111;
  display: grid;
  grid-template-columns: 1fr 1fr;
}
.meta-links { border-right: 1px solid #ddd; padding: 10px 0; }
.meta-rechts { padding: 10px 0 10px 20px; }
.meta-zeile {
  display: flex;
  gap: 12px;
  align-items: baseline;
  padding: 3px 0;
}
.meta-label {
  font-size: 11px;
  font-weight: 700;
  color: #111;
  min-width: 58px;
}
.meta-wert {
  font-size: 12px;
  color: #333;
  font-weight: 400;
}
.meta-wert.fett {
  font-weight: 700;
  color: #111;
}
.an-liste {
  display: flex;
  flex-direction: column;
  gap: 3px;
}

/* ── VORFALL-TABELLE ── */
.vorfall-table {
  margin: 18px 28px 0;
}
.vorfall-zeile {
  display: flex;
  gap: 0;
  padding: 5px 0;
  border-bottom: 1px solid #f0f0f0;
  align-items: flex-start;
}
.v-label {
  font-size: 12px;
  font-weight: 700;
  min-width: 90px;
  color: #111;
  padding-top: 1px;
}
.v-wert {
  font-size: 12px;
  color: #333;
  flex: 1;
  display: flex;
  align-items: center;
  gap: 7px;
  flex-wrap: wrap;
}
.v-wert.urteil-text {
  font-weight: 700;
  color: #111;
  font-size: 13px;
}

/* ── GRUND ── */
.grund-block {
  margin: 14px 28px 0;
  display: flex;
  gap: 0;
  align-items: flex-start;
}
.grund-label {
  font-size: 12px;
  font-weight: 700;
  min-width: 90px;
  color: #111;
  padding-top: 2px;
  flex-shrink: 0;
}
.grund-text {
  font-size: 12px;
  color: #333;
  line-height: 1.6;
  flex: 1;
}

/* ── VIDEOS / QR ── */
.videos-block {
  margin: 14px 28px 0;
  display: flex;
  gap: 0;
  align-items: flex-start;
}
.videos-label {
  font-size: 12px;
  font-weight: 700;
  min-width: 90px;
  color: #111;
  padding-top: 2px;
  flex-shrink: 0;
}
.videos-links {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.video-item {
  display: flex;
  align-items: flex-start;
  gap: 12px;
}
.qr-box {
  flex-shrink: 0;
  width: 64px; height: 64px;
  background: #fff;
  border: 1px solid #ccc;
  padding: 3px;
  display: flex; align-items: center; justify-content: center;
}
.qr-box canvas, .qr-box img { width: 58px !important; height: 58px !important; }
.video-link-text {
  font-size: 11px;
  color: #0055cc;
  word-break: break-all;
  line-height: 1.5;
  padding-top: 4px;
}
.videos-leer { font-size: 12px; color: #999; font-style: italic; }

/* ── FUSSZEILE ── */
.fuss {
  margin-top: auto;
  padding: 8px 28px;
  border-top: 1px solid #111;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 9px;
  color: #888;
  letter-spacing: 0.5px;
}
.fuss-mitte { font-weight: 700; color: #555; font-size: 9px; letter-spacing: 1px; }

/* ── SEITENTRENN ── */
.seitentrenn { width: 210mm; margin: 0 auto; height: 16px; }

/* ══════════════════════════════════════════════
   ERGEBNISSEITE
══════════════════════════════════════════════ */

/* Positionskarten – kompakter als vorher */
.pos-karten {
  margin: 14px 28px 0;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.pos-karte {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 7px 12px;
  border-left: 4px solid #ccc;
  border-bottom: 1px solid #eee;
}
.pos-karte.abstieg  { border-left-color: #cc0000; background: #fff8f8; }
.pos-karte.aufstieg { border-left-color: #007a3d; background: #f6fff9; }
.pk-pfeil { font-size: 16px; font-weight: 900; width: 20px; text-align: center; }
.pos-karte.abstieg  .pk-pfeil { color: #cc0000; }
.pos-karte.aufstieg .pk-pfeil { color: #007a3d; }
.pk-name { font-size: 12px; font-weight: 700; text-transform: uppercase; flex: 1; color: #111; }
.pk-pos { display: flex; align-items: center; gap: 5px; }
.pk-von { font-size: 12px; font-weight: 600; color: #aaa; text-decoration: line-through; padding: 1px 5px; background: #f0f0f0; min-width: 28px; text-align: center; }
.pk-arrow { font-size: 11px; color: #aaa; min-width: 12px; text-align: center; }
.pk-nach { font-size: 14px; font-weight: 900; padding: 1px 6px; min-width: 28px; text-align: center; }
.pos-karte.abstieg  .pk-nach { color: #cc0000; background: #ffe8e8; }
.pos-karte.aufstieg .pk-nach { color: #007a3d; background: #d8f5e8; }

/* Ergebnistabelle */
.erg-titel {
  margin: 16px 28px 8px;
  font-size: 11px;
  font-weight: 700;
  color: #111;
  letter-spacing: 1px;
  text-transform: uppercase;
  border-bottom: 2px solid #e10600;
  padding-bottom: 4px;
}
.ergtab { margin: 0 28px; border: 1px solid #ddd; overflow: hidden; }
.erg-cols {
  display: grid;
  grid-template-columns: 26px 275px 20px 1fr 22px 28px 22px 22px 22px 54px 22px 44px;
  align-items: center;
}
.erg-head {
  padding: 6px 8px 6px 12px;
  background: #111;
  font-size: 8px; font-weight: 700; letter-spacing: 1px;
  color: #fff; text-transform: uppercase;
}
.erg-row {
  padding: 5px 8px 5px 13px;
  border-bottom: 1px solid #f0f0f0;
  position: relative;
}
.erg-row:nth-child(even) { background: #fafafa; }
.erg-row:last-child { border-bottom: none; }
.erg-row.up   { background: #f2fdf6 !important; }
.erg-row.down { background: #fff4f4 !important; }
.erg-row.dnf  { opacity: 0.4; }
.estripe { position: absolute; left: 0; top: 0; bottom: 0; width: 3px; }
.ep { font-size: 11px; font-weight: 700; color: #888; text-align: center; }
.erg-fahrer-name { font-size: 11px; font-weight: 700; text-transform: uppercase; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding-left: 4px; color: #111; }
.erg-team-logo-cell { display: flex; align-items: center; justify-content: flex-start; }
.erg-team-logo-cell img { width: 14px; height: 14px; object-fit: contain; }
.erg-team-name { font-size: 9px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding-left: 3px; color: #555; }
.ecell { display: flex; align-items: center; justify-content: center; }
.epkt  { font-size: 11px; font-weight: 700; color: #111; text-align: right; }
.epkt .pl { font-size: 7px; color: #aaa; font-weight: 600; }

.pos-pfeil { display: inline-block; font-size: 9px; font-weight: 700; padding: 0px 2px; margin-left: 2px; vertical-align: middle; border-radius: 1px; }
.pos-pfeil.up   { color: #007a3d; background: #d8f5e8; border: 1px solid #aaddbb; }
.pos-pfeil.down { color: #cc0000; background: #ffe8e8; border: 1px solid #ffbbbb; }

.strafen-cell { display: flex; align-items: center; justify-content: center; font-size: 8px; font-weight: 700; padding: 0 2px; }
.st-spiel      { color: #994400; border: 1px solid #ddaa77; background: #fff5ee; padding: 1px 3px; white-space: nowrap; }
.st-komitee    { color: #cc0000; border: 1px solid #ffaaaa; background: #ffe8e8; padding: 1px 3px; white-space: nowrap; font-weight: 900; }
.st-gestrichen { color: #aaa; border: 1px solid #ddd; background: #f5f5f5; padding: 1px 3px; white-space: nowrap; text-decoration: line-through; }
.st-reduziert  { display: inline-flex; align-items: center; gap: 3px; color: #886600; border: 1px solid #ddcc88; background: #fffbe8; padding: 1px 4px; white-space: nowrap; }
.st-reduziert .alt { text-decoration: line-through; opacity: 0.5; font-size: 7px; }
.st-reduziert .neu { font-weight: 900; font-size: 10px; }

.ebadge { display: inline-flex; align-items: center; justify-content: center; font-size: 7px; font-weight: 700; padding: 1px 2px; letter-spacing: 0.3px; text-transform: uppercase; white-space: nowrap; border-radius: 1px; }
.eb-fl  { color: #5500aa; border: 1px solid #9966cc; background: #f0e8ff; }
.eb-ts  { color: #5500aa; border: 1px solid #9966cc; background: #f0e8ff; }
.eb-fdt { color: #003388; border: 1px solid #7799cc; background: #e8f0ff; }
.eb-müm { color: #775500; border: 1px solid #bbaa55; background: #fffbe0; }
.eb-sbf { color: #005522; border: 1px solid #55aa77; background: #e8fff0; }
.eb-dnf { color: #cc0000; border: 1px solid #ffaaaa; background: #ffe8e8; }

/* Einspruch */
.einspruch-block {
  margin: 12px 28px 0;
  font-size: 11px;
  color: #333;
  line-height: 1.6;
}
.einspruch-block strong { color: #111; }

/* PRINT */
@media print {
  @page { size: A4; margin: 0; }
  body { background: #fff !important; }
  #ladescreen { display: none !important; }
  .seite { width: 210mm; min-height: 297mm; height: 297mm; margin: 0; page-break-after: always; break-after: page; box-shadow: none; }
  .seite:last-child { page-break-after: auto; break-after: auto; }
  .seitentrenn { display: none; }
  * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
}
</style>
</head>

</div>

<div id="inhalt"></div>

<script>
const CFG = {
  KOMITEE_PUB:       '2PACX-1vSHnkRNxlOgpUpcs3wic82EBODpYeFm6HyKbVvWj25yuBwhjHvq4uLBeltRSxeFlhRtzs15fxJ1LDGn',
  GID_EINSTELLUNGEN: '0',

  GID_ERGEBNISSE:    '1314431822',
};

const FAHRER_FARBEN = {
  'razerj1887':        '#01ffff',
  'lemi':              '#38761d',
  'maxi':              '#ff9900',
  'grubery':           '#0050ff',
  'föcki92':           '#ece5d0',

  'penx':              '#ffff00',

  'justin113_yt':      '#ffff00',

const TEAMS = {
  'brohogs racing':           { logo: 'https://i.postimg.cc/mZdpg8JH/BROHOGS-Logo-10-Jahre.png', f: '#b28448' },
  'hyper engine racing team': { logo: 'https://i.postimg.cc/bJNDFhp0/HERT-neu.png',              f: '#ff00ff' },
  'dragon force f1cc team':   { logo: 'https://i.imgur.com/m5bK6PY.png',                         f: '#9900ff' },
  'dragon force':             { logo: 'https://i.imgur.com/m5bK6PY.png',                         f: '#9900ff' },
  'infinity racing':          { logo: 'https://i.imgur.com/7SNUgPy.png',                          f: '#0050ff' },
  'pegasus racing':           { logo: 'https://i.imgur.com/Du2GByr.png',                          f: '#01ffff' },
  '2fastracing':              { logo: 'https://i.imgur.com/mZaHdQE.png',                          f: '#ff9900' },
  '2fast racing':             { logo: 'https://i.imgur.com/mZaHdQE.png',                          f: '#ff9900' },
  'undercover f1cc team':     { logo: 'https://i.imgur.com/wyzPR01.png',                          f: '#d4d400' },
  'undercover':               { logo: 'https://i.imgur.com/wyzPR01.png',                          f: '#d4d400' },
  'cobras squad racing':      { logo: 'https://i.postimg.cc/mgcYJr0w/COBRAS-SQUAD.png',           f: '#38761d' },
  'cobra squad racing':       { logo: 'https://i.postimg.cc/mgcYJr0w/COBRAS-SQUAD.png',           f: '#38761d' },
  'cobra squad':              { logo: 'https://i.postimg.cc/mgcYJr0w/COBRAS-SQUAD.png',           f: '#38761d' },
  'black bull racing':        { logo: 'https://i.imgur.com/D5pz4fV.png',                          f: '#ece5d0' },
};

function getTeam(name) {
  if (!name) return null;
  return TEAMS[name.trim().toLowerCase()] || null;
}

function kuerzeStrafe(text) {
  if (!text) return '';
  const m = text.match(/(\d+)\s*[Ss]ekunden?/);
  if (m) return `+${m[1]}s`;
  const m2 = text.match(/\+\s*(\d+)\s*s/i);
  if (m2) return `+${m2[1]}s`;
  return '';
}

async function fetchCSV(pubId, gid) {
  const bust = `${Date.now()}_${Math.random().toString(36).slice(2)}`;
  const url = `https://docs.google.com/spreadsheets/d/e/${pubId}/pub?gid=${gid}&single=true&output=csv&cachebust=${bust}`;
  const r = await fetch(url, { cache: 'no-store' });
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  return r.text();
}

function parseCSV(text) {
  const lines = text.trim().split('\n');
  return lines.map(line => {
    const cols = [];
    let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (c === '"') { inQ = !inQ; }
      else if (c === ',' && !inQ) { cols.push(cur.trim()); cur = ''; }
      else { cur += c; }
    }
    cols.push(cur.trim());
    return cols;
  });
}

// ── HTML-BAUSTEINE ──

function kopfHTML(einst) {
  return `
  <div class="kopf">
    <div class="kopf-partner">
      <img src="https://i.postimg.cc/nV3MHGmj/grafik.png" alt="EA">
      <img src="https://i.postimg.cc/wMN6cLWN/grafik.png" alt="FSL">
    </div>
    <div class="kopf-logo"><img src="https://i.postimg.cc/66b5s5Jx/grafik.png" alt="F1CC"></div>
    <div class="kopf-gp">${einst.flagge} ${einst.gpName}</div>
    <div class="kopf-datum">${einst.renndatum}</div>
  </div>`;
}

function fussHTML(einst, dokNr) {
  return `
  <div class="fuss">
    <span>F1CC – Offizieller Komiteebericht</span>
    <span class="fuss-mitte">DOKUMENT ${dokNr} · SAISONRENNEN NR. ${einst.rennnummer}</span>
    <span>${einst.gpName} ${new Date().getFullYear()}</span>
  </div>`;
}

function metaHTML(vom, an, dokNr, datum, uhrzeit) {
  const anListe = Array.isArray(an) ? an : [an];
  const anHTML = anListe.length > 0
    ? anListe.map(t => `<span>${t}</span>`).join('')
    : `<span>Free Agent</span>`;
  return `
  <div class="meta-table">
    <div class="meta-links">
      <div class="meta-zeile"><span class="meta-label">Vom</span><span class="meta-wert">${vom}</span></div>
      <div class="meta-zeile"><span class="meta-label">An</span><span class="meta-wert fett an-liste">${anHTML}</span></div>
    </div>
    <div class="meta-rechts">
      <div class="meta-zeile"><span class="meta-label">Dokument</span><span class="meta-wert fett">${dokNr}</span></div>
      <div class="meta-zeile"><span class="meta-label">Datum</span><span class="meta-wert fett">${datum}</span></div>
      <div class="meta-zeile"><span class="meta-label">Uhrzeit</span><span class="meta-wert fett">${uhrzeit}</span></div>
    </div>
  </div>`;
}

// ── STRAFSEITE ──

function buildStrafseite(einst, dok, fahrer, qrCounter) {
  const qrIds = [];

  // "An" aus Team-Namen
  const anTeams = [...new Set(fahrer.map(f => f.team).filter(Boolean))];
  const anListe = anTeams.length > 0 ? anTeams : (dok.anTeams && dok.anTeams.length > 0 ? dok.anTeams : ['Free Agent']);

  // Fahrernamen-Zeilen
  const fahrerZeilen = fahrer.map((f, i) => `
    <div class="vorfall-zeile">
      <span class="v-label">${i === 0 ? 'Fahrer' : ''}</span>
      <span class="v-wert">${f.fahrer}</span>
    </div>`).join('');

  // Team-Zeilen (ohne Teamfarbe, nur Logo + Name)
  const teamZeilen = fahrer.map((f, i) => {
    const team = getTeam(f.team);
    const logoHTML = team ? `<img src="${team.logo}" style="width:16px;height:16px;object-fit:contain">` : '';
    return `
    <div class="vorfall-zeile">
      <span class="v-label">${i === 0 ? 'Team' : ''}</span>
      <span class="v-wert">${logoHTML}${f.team || 'Free Agent'}</span>
    </div>`;
  }).join('');

  // Urteil-Blöcke
  let urteileHTML = '';
  dok.urteile.forEach((u, idx) => {
    urteileHTML += `
    <div class="vorfall-table">
      <div class="vorfall-zeile">
        <span class="v-label">Urteil</span>
        <span class="v-wert urteil-text">${u.text || '–'}</span>
      </div>
    </div>`;

    urteileHTML += `
    <div class="grund-block">
      <span class="grund-label">Grund</span>
      <span class="grund-text">${u.begruendung || '–'}</span>
    </div>`;

    // Videos / QR
    const links = [u.videoLink1, u.videoLink2].filter(Boolean);
    if (links.length > 0) {
      let linksHTML = '';
      links.forEach((link, i) => {
        const qrId = `qr${qrCounter++}`;
        qrIds.push({ id: qrId, url: link });
        linksHTML += `
        <div class="video-item">
          <div class="qr-box" id="${qrId}"></div>
          <div class="video-link-text">${link}</div>
        </div>`;
      });
      urteileHTML += `
    <div class="videos-block">
      <span class="videos-label">Videos</span>
      <div class="videos-links">${linksHTML}</div>
    </div>`;
    } else {
      urteileHTML += `
    <div class="videos-block">
      <span class="videos-label">Videos</span>
      <div class="videos-links"><span class="videos-leer">–</span></div>
    </div>`;
    }
  });

  const html = `
<div class="seite">
  ${kopfHTML(einst)}
  ${metaHTML('Komitee', anListe, dok.dokNr, dok.datum, dok.uhrzeit)}
  <div class="vorfall-table">
    ${fahrerZeilen}
    ${teamZeilen}
    <div class="vorfall-zeile">
      <span class="v-label">Session</span>
      <span class="v-wert">${dok.session || '–'}</span>
    </div>
    <div class="vorfall-zeile">
      <span class="v-label">Runde</span>
      <span class="v-wert">${dok.runde || '–'}</span>
    </div>
    <div class="vorfall-zeile">
      <span class="v-label">Vergehen</span>
      <span class="v-wert">${dok.vergehen || '–'}</span>
    </div>
  </div>
  ${urteileHTML}
  ${fussHTML(einst, dok.dokNr)}
</div>`;

  return { html, qrIds, qrCounter };
}

// ── ERGEBNISSEITE ──

function buildErgebnisseite(einst, posAend, spielstrafen, komiteestrafen, ergebnisRows, letztesDokNr, uhrzeit) {
  const dokNr = parseInt(letztesDokNr) + 1;

  const posUpMap = {}, posDownMap = {};
  posAend.forEach(p => {
    const key = p.fahrer.trim().toLowerCase();
    if (p.typ === 'aufstieg') posUpMap[key] = true;
    if (p.typ === 'abstieg')  posDownMap[key] = true;
  });
  const komMap = {};
  komiteestrafen.forEach(k => { komMap[k.fahrer.toLowerCase()] = k.strafe; });
  const spielMap = {};
  spielstrafen.forEach(s => { spielMap[s.fahrer.toLowerCase()] = s; });

  // Positionskarten
  const posKartenHTML = posAend.length > 0 ? `
  <div class="pos-karten">
    ${posAend.map(p => `
    <div class="pos-karte ${p.typ}">
      <div class="pk-pfeil">${p.typ === 'abstieg' ? '↓' : '↑'}</div>
      <div class="pk-name">${p.fahrer}</div>
      <div class="pk-pos">
        <div class="pk-von">P${p.von}</div>
        <div class="pk-arrow">→</div>
        <div class="pk-nach">P${p.nach}</div>
      </div>
    </div>`).join('')}
  </div>` : '';

  // Ergebnistabelle
  const ergZeilen = ergebnisRows.map(row => {
    const fname  = row.fahrer || '';
    const fkey   = fname.toLowerCase();
    const farbe  = FAHRER_FARBEN[fkey] || '#888888';
    const isUp   = !!posUpMap[fkey];
    const isDown = !!posDownMap[fkey];
    const isDNF  = !!(row.dnf && row.dnf.trim());
    const rowCls = isDNF ? 'dnf' : isUp ? 'up' : isDown ? 'down' : '';
    const pfeil  = isUp ? `<span class="pos-pfeil up">↑</span>` : isDown ? `<span class="pos-pfeil down">↓</span>` : '';

    const teamObj      = getTeam(row.team);
    const teamLogoHTML = teamObj ? `<img src="${teamObj.logo}" alt="">` : '';

    const kom = komMap[fkey];
    const sp  = spielMap[fkey];
    const parts = [];
    if (kom) parts.push(`<span class="st-komitee">${kom} ⚑</span>`);
    if (sp) {
      if (sp.status === 'gestrichen') parts.push(`<span class="st-gestrichen">${sp.strafe}</span>`);
      else if (sp.status === 'reduziert') parts.push(`<span class="st-reduziert"><span class="alt">${sp.strafe}</span><span class="neu">${sp.neu}</span></span>`);
      else parts.push(`<span class="st-spiel">${sp.strafe}</span>`);
    }
    const strafenInner = parts.length ? parts.join('&nbsp;') : `<span style="color:#ddd">–</span>`;

    return `
    <div class="erg-cols erg-row ${rowCls}" style="padding-left:13px">
      <div class="estripe" style="background:${farbe}"></div>
      <div class="ep">${row.pos}</div>
      <div class="erg-fahrer-name">${fname}${pfeil}</div>
      <div class="erg-team-logo-cell">${teamLogoHTML ? `<img src="${teamObj.logo}" alt="">` : ''}</div>
      <div class="erg-team-name">${row.team || 'Free Agent'}</div>
      <div class="ecell">${row.fl  ? `<span class="ebadge eb-fl">FL</span>`       : ''}</div>
      <div class="ecell">${row.ts  ? `<span class="ebadge eb-ts">${row.ts}</span>`: ''}</div>
      <div class="ecell">${row.fdt ? `<span class="ebadge eb-fdt">FDT</span>`     : ''}</div>
      <div class="ecell">${row.müm ? `<span class="ebadge eb-müm">MÜM</span>`     : ''}</div>
      <div class="ecell">${row.sbf ? `<span class="ebadge eb-sbf">SBF</span>`     : ''}</div>
      <div class="strafen-cell">${strafenInner}</div>
      <div class="ecell">${isDNF  ? `<span class="ebadge eb-dnf">DNF</span>`     : ''}</div>
      <div class="epkt">${row.gesPkt} <span class="pl">PKT</span></div>
    </div>`;
  }).join('');

  const tabHTML = `
  <div class="erg-titel">Rennergebnis</div>
  <div class="ergtab">
    <div class="erg-cols erg-head">
      <div style="text-align:center">P</div>
      <div style="padding-left:4px">Fahrer</div>
      <div></div>
      <div>Team</div>
      <div style="text-align:center">FL</div>
      <div style="text-align:center">TS</div>
      <div style="text-align:center">FDT</div>
      <div style="text-align:center">MÜM</div>
      <div style="text-align:center">SBF</div>
      <div style="text-align:center">Strafen</div>
      <div style="text-align:center">DNF</div>
      <div style="text-align:right">PKT</div>
    </div>
    ${ergZeilen}
  </div>`;

  const einspruchHTML = `
  <div class="einspruch-block">
    Wenn es <strong>signifikante, neue Beweise/Beispiele</strong> gibt, darf gegen dieses Rennergebnis
    bis zum <strong>${einst.einspruchsfrist} 23:59 Uhr</strong> Einspruch eingelegt werden.
    Diese dürfen nur auf Grundlage von aktuell verfügbaren Regelwerken getätigt werden.
  </div>`;

  // Ab 3 Positionsänderungen: Ergebnis auf eigene Seite
  if (posAend.length >= 3) {
    return `
<div class="seite">
  ${kopfHTML(einst)}
  ${metaHTML('Komitee', 'Fahrer', dokNr, einst.berichtDatum, uhrzeit)}
  ${posKartenHTML}
  ${fussHTML(einst, dokNr)}
</div>
<div class="seitentrenn"></div>
<div class="seite">
  ${kopfHTML(einst)}
  ${tabHTML}
  ${einspruchHTML}
  ${fussHTML(einst, dokNr)}
</div>`;
  }

  return `
<div class="seite">
  ${kopfHTML(einst)}
  ${metaHTML('Komitee', 'Fahrer', dokNr, einst.berichtDatum, uhrzeit)}
  ${posKartenHTML}
  ${tabHTML}
  ${einspruchHTML}
  ${fussHTML(einst, dokNr)}
</div>`;
}

// ── PARSEN ──

function parseErgebnisse(csv, rennnummer) {
  const rows = parseCSV(csv).slice(1);
  const nr = parseInt(rennnummer);
  const startIdx = (nr - 1) * 36 + 10;
  const block = rows.slice(startIdx, startIdx + 22);
  const ergebnisse = [];
  block.forEach((r, i) => {
    const fahrer = (r[10] || '').trim();
    if (!fahrer) return;
    ergebnisse.push({
      pos:    i + 1,
      fahrer: fahrer,
      team:   (r[11] || '').trim(),
      fl:     (r[14] || '').trim(),
      ts:     (r[15] || '').trim(),
      fdt:    (r[16] || '').trim(),
      müm:    (r[17] || '').trim(),
      sbf:    (r[18] || '').trim(),
      dnf:    (r[19] || '').trim(),
      gesPkt: (r[21] || '0').trim(),
    });
  });
  return ergebnisse;
}

// ── MAIN ──

async function main() {
  const ladeText   = document.getElementById('lade-text');
  const ladeFehler = document.getElementById('lade-fehler');

  try {
    ladeText.textContent = 'Daten laden …';
    const [csvEinst, csvFaelle, csvPos, csvSpiel, csvErg] = await Promise.all([
      fetchCSV(CFG.KOMITEE_PUB, CFG.GID_EINSTELLUNGEN),
      fetchCSV(CFG.KOMITEE_PUB, CFG.GID_FAELLE),
      fetchCSV(CFG.KOMITEE_PUB, CFG.GID_POSITIONSAEND),
      fetchCSV(CFG.KOMITEE_PUB, CFG.GID_SPIELSTRAFEN),
      fetchCSV(CFG.ERGEBNIS_PUB, CFG.GID_ERGEBNISSE),
    ]);

    ladeText.textContent = 'Verarbeiten …';

    // Einstellungen
    const eRows = parseCSV(csvEinst).slice(1);
    const einst = {
      rennnummer:      (eRows[0]?.[1] || '').trim(),
      gpName:          (eRows[1]?.[1] || '').trim(),
      flagge:          (eRows[2]?.[1] || '').trim(),
      renndatum:       (eRows[3]?.[1] || '').trim(),
      einspruchsfrist: (eRows[4]?.[1] || '').trim(),
      berichtDatum:    (eRows[5]?.[1] || '').trim(),
    };

    // Fälle
    const fRows = parseCSV(csvFaelle).slice(1).filter(r => r[0]?.trim());
    const dokMap = new Map();

    fRows.forEach(r => {
      const nr = r[0].trim();
      if (!dokMap.has(nr)) {
        dokMap.set(nr, {
          dokNr:    nr,
          datum:    r[2]?.trim() || '',
          uhrzeit:  r[3]?.trim() || '',
          session:  r[6]?.trim() || '',
          runde:    r[7]?.trim() || '',
          vergehen: r[8]?.trim() || '',
          urteile:  [],
          fahrer:   [],
          anTeams:  [],
        });
      } else {
        const d = dokMap.get(nr);
        if (r[2]?.trim() && !d.datum)   d.datum   = r[2].trim();
        if (r[3]?.trim() && !d.uhrzeit) d.uhrzeit = r[3].trim();
        if (r[6]?.trim() && !d.session) d.session = r[6].trim();
        if (r[7]?.trim() && !d.runde)   d.runde   = r[7].trim();
        if (r[8]?.trim() && !d.vergehen)d.vergehen= r[8].trim();
      }

      const urteil = {
        text:        r[9]?.trim()  || '',
        typ:         r[10]?.trim() || 'strafe',
        begruendung: r[11]?.trim() || '',
        videoLink1:  r[12]?.trim() || '',
        videoLink2:  r[13]?.trim() || '',
        bestrafter:  r[14]?.trim() || '',
      };
      if (urteil.text || urteil.begruendung || urteil.videoLink1 || urteil.bestrafter) {
        dokMap.get(nr).urteile.push(urteil);
      }

      const fahrerName = r[4]?.trim();
      const teamName   = r[5]?.trim();
      if (fahrerName) dokMap.get(nr).fahrer.push({ fahrer: fahrerName, team: teamName || '' });
      if (teamName && !dokMap.get(nr).anTeams.includes(teamName)) dokMap.get(nr).anTeams.push(teamName);
    });



    // Positionsänderungen
    const pRows = parseCSV(csvPos).slice(1).filter(r => r[0]?.trim());
    const posAend = pRows.map(r => ({
      fahrer: r[0].trim(),
      von:    r[1].trim(),
      nach:   r[2].trim(),
      typ:    r[3].trim().toLowerCase(),
    }));

    // Spielstrafen
    const sRows = parseCSV(csvSpiel).slice(1).filter(r => r[0]?.trim());
    const spielstrafen = sRows.map(r => ({
      fahrer: r[0].trim(),
      strafe: r[1].trim(),
      status: (r[2]?.trim() || 'aktiv').toLowerCase(),
      neu:    r[3]?.trim() || '',
    }));

    // Komiteestrafen
    const komiteestrafen = [];
    dokMap.forEach(dok => {
      dok.urteile.forEach(u => {
        const typ = (u.typ || '').toLowerCase();
        if (typ !== 'strafe' && typ !== 'streichung') return;
        const gekuerzt = kuerzeStrafe(u.text);
        if (!gekuerzt || !u.bestrafter) return;
        u.bestrafter.split(',').map(s => s.trim().toLowerCase()).filter(Boolean).forEach(name => {
          komiteestrafen.push({ fahrer: name, strafe: gekuerzt });
        });
      });
    });

    const letzteNr      = [...dokMap.keys()].sort((a, b) => parseInt(a) - parseInt(b)).at(-1) || '0';
    const letzteUhrzeit = dokMap.get(letzteNr)?.uhrzeit || '';
    const ergebnisRows  = parseErgebnisse(csvErg, einst.rennnummer);

    ladeText.textContent = 'Seiten aufbauen …';
    let allHTML = '';
    const alleQrIds = [];
    let qrCounter = 1;

    const dokNrs = [...dokMap.keys()].sort((a, b) => parseInt(a) - parseInt(b));
    dokNrs.forEach((nr, i) => {
      const dok = dokMap.get(nr);
      if (i > 0) allHTML += '<div class="seitentrenn"></div>';
      const result = buildStrafseite(einst, dok, dok.fahrer, qrCounter);
      allHTML += result.html;
      alleQrIds.push(...result.qrIds);
      qrCounter = result.qrCounter;
    });

    allHTML += '<div class="seitentrenn"></div>';
    allHTML += buildErgebnisseite(einst, posAend, spielstrafen, komiteestrafen, ergebnisRows, letzteNr, letzteUhrzeit);

    document.getElementById('inhalt').innerHTML = allHTML;

    ladeText.textContent = 'QR-Codes generieren …';
    alleQrIds.forEach(({ id, url }) => {
      const el = document.getElementById(id);
      if (el && url) new QRCode(el, { text: url, width: 58, height: 58, colorDark: '#000', colorLight: '#fff', correctLevel: QRCode.CorrectLevel.M });
    });

    document.getElementById('ladescreen').style.display = 'none';

  } catch (err) {
    ladeFehler.style.display = 'block';
    ladeFehler.textContent = `Fehler beim Laden: ${err.message}. Stelle sicher, dass die Google Sheets Datei veröffentlicht ist.`;
    ladeText.textContent = 'Laden fehlgeschlagen';
    console.error(err);
  }
}

main();
</script>
