<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>F1CC Offizieller Komiteebericht</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  :root {
    --rot:    #e10600;
    --dunkel: #1c1c1c;
    --trenn:  #2e2e2e;
    --text:   #f0f0f0;
    --grau:   #888;
    --hell:   #bbb;
    --s-rot:  #ff3333;
    --s-grün: #00e676;
    --s-gelb: #ffcc00;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #111; color: var(--text); font-family: 'Barlow Condensed', sans-serif; }

  /* LADESCREEN */
  #ladescreen {
    position: fixed; inset: 0; background: #111;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 16px; z-index: 999;
  }
  #ladescreen img { height: 60px; }
  #lade-text { font-size: 13px; color: var(--grau); letter-spacing: 3px; text-transform: uppercase; }
  #lade-fehler { font-size: 12px; color: var(--s-rot); max-width: 400px; text-align: center; display: none; font-family: 'Barlow', sans-serif; }
  .lade-spinner { width: 32px; height: 32px; border: 3px solid #333; border-top-color: var(--rot); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* SEITE */
  .seite {
    width: 210mm; min-height: 297mm; margin: 0 auto 24px;
    background: var(--dunkel);
    background-image: radial-gradient(ellipse at 6% 0%, rgba(225,6,0,0.07) 0%, transparent 42%), radial-gradient(ellipse at 94% 100%, rgba(225,6,0,0.04) 0%, transparent 42%);
    display: flex; flex-direction: column; overflow: hidden;
  }

  /* KOPF – grid: logo | mitte | partner, alle zentriert */
  .kopf {
    display: grid; grid-template-columns: 120px 1fr 120px;
    align-items: center; padding: 16px 22px 13px;
    border-bottom: 3px solid var(--rot);
  }
  .kopf-logo img { height: 42px; display: block; }
  .kopf-mitte { text-align: center; }
  .kopf-gp   { font-size: 19px; font-weight: 900; letter-spacing: 0.4px; }
  .kopf-datum { font-size: 11px; color: var(--grau); letter-spacing: 2px; margin-top: 1px; }
  /* Partner übereinander, rechtsbündig */
  .kopf-partner { display: flex; flex-direction: column; gap: 5px; align-items: flex-end; }
  .kopf-partner img:first-child { height: 16px; object-fit: contain; display: block; }
  .kopf-partner img:last-child  { height: 12px; object-fit: contain; display: block; }

  .subband {
    background: var(--rot); text-align: center; padding: 4px;
    font-size: 9px; font-weight: 800; letter-spacing: 4px; text-transform: uppercase; margin-bottom: 18px;
  }

  /* META */
  .meta { margin: 0 22px 18px; display: grid; grid-template-columns: 1fr 1fr; border: 1px solid var(--trenn); border-radius: 6px; overflow: hidden; }
  .meta-links { border-right: 1px solid var(--trenn); }
  .meta-z { display: flex; align-items: baseline; gap: 10px; padding: 8px 13px; border-bottom: 1px solid var(--trenn); }
  .meta-z:last-child { border-bottom: none; }
  .ml { font-size: 10px; font-weight: 800; letter-spacing: 1.5px; text-transform: uppercase; color: var(--grau); min-width: 52px; }
  .mv { font-size: 14px; font-weight: 600; color: var(--hell); }
  .mv.bold { color: var(--text); font-weight: 800; font-size: 15px; }

  /* ABSCHNITT-TITEL */
  .at { margin: 0 22px 9px; font-size: 9px; font-weight: 800; letter-spacing: 3px; text-transform: uppercase; color: var(--grau); display: flex; align-items: center; gap: 10px; }
  .at::after { content: ''; flex: 1; height: 1px; background: var(--trenn); }

  /* DETAIL-TABELLE */
  .dtab { margin: 0 22px 16px; border: 1px solid var(--trenn); border-radius: 6px; overflow: hidden; }
  .dz { display: grid; grid-template-columns: 110px 1fr; border-bottom: 1px solid var(--trenn); min-height: 36px; }
  .dz:last-child { border-bottom: none; }
  .dl { padding: 9px 13px; font-size: 9px; font-weight: 800; letter-spacing: 1.5px; text-transform: uppercase; color: var(--grau); border-right: 1px solid var(--trenn); background: rgba(255,255,255,0.02); display: flex; align-items: center; }
  .dv { padding: 9px 13px; font-size: 13px; font-weight: 600; color: var(--hell); display: flex; align-items: center; gap: 8px; }
  .dv.bold { font-size: 14px; font-weight: 800; color: var(--text); }

  /* URTEIL */
  .urteil { margin: 0 22px 16px; border-radius: 6px; padding: 13px 16px; display: flex; align-items: center; gap: 14px; }
  .urteil.strafe     { background: rgba(255,51,51,0.07);  border: 1px solid rgba(255,51,51,0.28);  border-left: 4px solid var(--s-rot); }
  .urteil.streichung { background: rgba(0,230,118,0.07); border: 1px solid rgba(0,230,118,0.28); border-left: 4px solid var(--s-grün); }
  .urteil.keine      { background: rgba(136,136,136,0.07); border: 1px solid rgba(136,136,136,0.28); border-left: 4px solid #666; }
  .u-icon { font-size: 26px; line-height: 1; }
  .u-label { font-size: 9px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; color: var(--grau); margin-bottom: 3px; }
  .u-text  { font-size: 17px; font-weight: 900; }
  .urteil.strafe     .u-text { color: var(--s-rot); }
  .urteil.streichung .u-text { color: var(--s-grün); }
  .urteil.keine      .u-text { color: #888; }

  /* TEXTBOX */
  .textbox { margin: 0 22px 16px; padding: 12px 15px; background: rgba(255,255,255,0.025); border: 1px solid var(--trenn); border-radius: 6px; font-family: 'Barlow', sans-serif; font-size: 12px; color: var(--hell); line-height: 1.6; }

  /* QR */
  .qr-outer { margin: 0 22px 16px; display: flex; flex-direction: column; gap: 8px; }
  .qr-wrap { display: flex; align-items: flex-start; gap: 14px; padding: 12px 15px; background: rgba(255,255,255,0.025); border: 1px solid var(--trenn); border-radius: 6px; }
  .qr-code-box { flex-shrink: 0; width: 72px; height: 72px; background: #fff; border-radius: 4px; padding: 4px; display: flex; align-items: center; justify-content: center; }
  .qr-code-box canvas, .qr-code-box img { width: 64px !important; height: 64px !important; }
  .qr-text { flex: 1; }
  .qr-label { font-size: 9px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; color: var(--grau); margin-bottom: 4px; }
  .qr-link  { font-size: 11px; color: #5599ff; word-break: break-all; font-family: 'Barlow', sans-serif; line-height: 1.5; }
  .qr-hint  { font-size: 9px; color: #555; margin-top: 4px; font-family: 'Barlow', sans-serif; }

  /* POSITIONSKARTEN */
  .pos-karten { margin: 0 22px 16px; display: flex; flex-direction: column; gap: 6px; }
  .pos-karte { display: flex; align-items: center; gap: 12px; padding: 11px 15px; border-radius: 6px; border: 1px solid; }
  .pos-karte.abstieg  { background: rgba(255,51,51,0.07);  border-color: rgba(255,51,51,0.3);  border-left: 4px solid var(--s-rot); }
  .pos-karte.aufstieg { background: rgba(0,230,118,0.07); border-color: rgba(0,230,118,0.3); border-left: 4px solid var(--s-grün); }
  .pk-pfeil { font-size: 22px; font-weight: 900; line-height: 1; width: 28px; text-align: center; }
  .pos-karte.abstieg  .pk-pfeil { color: var(--s-rot); }
  .pos-karte.aufstieg .pk-pfeil { color: var(--s-grün); }
  .pk-name { font-size: 15px; font-weight: 900; text-transform: uppercase; flex: 1; }
  .pos-karte.abstieg  .pk-name { color: var(--s-rot); }
  .pos-karte.aufstieg .pk-name { color: var(--s-grün); }
  .pk-pos { display: flex; align-items: center; gap: 6px; }
  .pk-von { font-size: 16px; font-weight: 900; background: rgba(255,255,255,0.07); color: #aaa; border-radius: 4px; padding: 3px 8px; text-decoration: line-through; text-decoration-color: #555; }
  .pk-arrow { font-size: 13px; color: #555; }
  .pk-nach { font-size: 18px; font-weight: 900; border-radius: 4px; padding: 3px 8px; }
  .pos-karte.abstieg  .pk-nach { background: rgba(255,51,51,0.15);  color: var(--s-rot); }
  .pos-karte.aufstieg .pk-nach { background: rgba(0,230,118,0.15); color: var(--s-grün); }

  /* ERGEBNISTABELLE – separate Spalten mit festen Breiten */
  .ergtab { margin: 0 22px 16px; border: 1px solid var(--trenn); border-radius: 6px; overflow: hidden; }
  .erg-cols {
    display: grid;
    grid-template-columns: 24px 275px 20px 1fr 20px 28px 24px 24px 24px 56px 24px 44px;
    align-items: center;
  }
  .erg-fahrer-name {
    font-size: 12px; font-weight: 800; text-transform: uppercase;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    padding-left: 4px;
  }
  .erg-team-logo-cell {
    display: flex; align-items: center; justify-content: flex-start;
  }
  .erg-team-logo-cell img { width: 16px; height: 16px; object-fit: contain; }
  .erg-team-name {
    font-size: 10px; font-weight: 700;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    padding-left: 3px; text-align: left;
  }
  .erg-head { padding: 7px 10px 7px 13px; background: #111; border-bottom: 2px solid var(--rot); font-size: 9px; font-weight: 800; letter-spacing: 1px; color: var(--grau); text-transform: uppercase; }
  .erg-row  { padding: 7px 10px 7px 14px; border-bottom: 1px solid rgba(255,255,255,0.035); position: relative; }
  .erg-row:last-child { border-bottom: none; }
  .erg-row.up   { background: rgba(0,230,118,0.05); }
  .erg-row.down { background: rgba(255,51,51,0.05); }
  .erg-row.dnf  { opacity: 0.4; }
  .estripe { position: absolute; left: 0; top: 0; bottom: 0; width: 3px; }
  .ep    { font-size: 12px; font-weight: 900; color: var(--grau); text-align: center; }
  .elogo { display: flex; align-items: center; justify-content: center; }
  .elogo img { width: 16px; height: 16px; object-fit: contain; }
  .ename { font-size: 12px; font-weight: 800; text-transform: uppercase; padding-left: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .ecell { display: flex; align-items: center; justify-content: center; }
  .epkt  { font-size: 12px; font-weight: 900; color: var(--rot); text-align: right; }
  .epkt .pl { font-size: 8px; color: var(--grau); font-weight: 700; }

  .pos-pfeil { display: inline-block; font-size: 11px; font-weight: 900; padding: 1px 3px; border-radius: 3px; margin-left: 3px; vertical-align: middle; }
  .pos-pfeil.up   { background: rgba(0,230,118,0.2); color: var(--s-grün); border: 1px solid var(--s-grün); }
  .pos-pfeil.down { background: rgba(255,51,51,0.2);  color: var(--s-rot);  border: 1px solid var(--s-rot); }

  .strafen-cell { display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 800; padding: 0 2px; }
  .st-spiel      { color: #ff8800; border: 1px solid #ff8800; background: rgba(255,136,0,0.1); border-radius: 3px; padding: 1px 4px; white-space: nowrap; }
  .st-komitee    { color: var(--s-rot); border: 1px solid var(--s-rot); background: rgba(255,51,51,0.15); border-radius: 3px; padding: 1px 4px; white-space: nowrap; font-weight: 900; }
  .st-gestrichen { color: #555; border: 1px solid #383838; background: rgba(255,255,255,0.02); border-radius: 3px; padding: 1px 4px; white-space: nowrap; text-decoration: line-through; text-decoration-color: #555; }
  .st-reduziert  { display: inline-flex; align-items: center; gap: 3px; color: var(--s-gelb); border: 1px solid var(--s-gelb); background: rgba(255,204,0,0.1); border-radius: 3px; padding: 1px 4px; white-space: nowrap; }
  .st-reduziert .alt { text-decoration: line-through; opacity: 0.5; font-size: 8px; }
  .st-reduziert .neu { font-weight: 900; font-size: 9px; }

  .ebadge { display: inline-flex; align-items: center; justify-content: center; font-size: 8px; font-weight: 900; padding: 1px 3px; border-radius: 2px; letter-spacing: 0.3px; text-transform: uppercase; white-space: nowrap; }
  /* FL: lila */
  .eb-fl  { color: #b47cff; border: 1px solid #b47cff; background: rgba(180,124,255,0.1); }
  /* TS: lila (wie FL) */
  .eb-ts  { color: #b47cff; border: 1px solid #b47cff; background: rgba(180,124,255,0.1); }
  /* FDT: blau */
  .eb-fdt { color: #00aaff; border: 1px solid #00aaff; background: rgba(0,170,255,0.1); }
  /* MÜM: gelb (getauscht) */
  .eb-müm { color: #ffcc00; border: 1px solid #ffcc00; background: rgba(255,204,0,0.1); }
  /* SBF: grün */
  .eb-sbf { color: #00e676; border: 1px solid #00e676; background: rgba(0,230,118,0.1); }
  /* DNF: rot */
  .eb-dnf { color: #ff3333; border: 1px solid #ff3333; background: rgba(255,51,51,0.1); }

  /* EINSPRUCH */
  .einspruch { margin: 0 22px 16px; padding: 10px 14px; background: rgba(255,204,0,0.04); border: 1px solid rgba(255,204,0,0.18); border-left: 3px solid var(--s-gelb); border-radius: 4px; font-size: 11px; font-family: 'Barlow', sans-serif; color: var(--hell); line-height: 1.6; }
  .einspruch strong { color: var(--s-gelb); }

  /* FUSS */
  .fuss { margin-top: auto; padding: 10px 22px; border-top: 1px solid var(--trenn); display: flex; justify-content: space-between; align-items: center; font-size: 9px; color: #444; letter-spacing: 1px; }
  .fuss-dok { font-size: 10px; font-weight: 800; color: #555; letter-spacing: 2px; }

  .seitentrenn { width: 210mm; margin: 0 auto; height: 2px; background: linear-gradient(to right, transparent, #e10600 40%, #e10600 60%, transparent); opacity: 0.3; }

  @media print {
    @page { size: A4; margin: 0; }
    body { background: #1c1c1c !important; }
    #ladescreen { display: none !important; }
    .seite { width: 210mm; min-height: 297mm; height: 297mm; margin: 0; page-break-after: always; break-after: page; }
    .seite:last-child { page-break-after: auto; break-after: auto; }
    .seitentrenn { display: none; }
    * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
  }
</style>
</head>

<div id="inhalt"></div>

<script>
const CFG = {
  KOMITEE_PUB:       '2PACX-1vSHnkRNxlOgpUpcs3wic82EBODpYeFm6HyKbVvWj25yuBwhjHvq4uLBeltRSxeFlhRtzs15fxJ1LDGn',
  GID_EINSTELLUNGEN: '0',
  GID_FAELLE:        '115791115',
  GID_POSITIONSAEND: '1027675238',
  GID_SPIELSTRAFEN:  '879080934',
  ERGEBNIS_PUB:      '2PACX-1vS5Bf_pz0CevOZEgyj7g_ORF_-VWMapLUCtkr0DPQWb7jPlX7SvbwrXdO7UU-lYKXadhwtNzfCxaKP7',
  GID_ERGEBNISSE:    '1314431822',
};

// Fahrer → Farbe (direkte Zuordnung, da Teamzugehörigkeit im Ergebnis-Sheet fehlt)
const FAHRER_FARBEN = {
  'razerj1887':        '#01ffff',
  'lemi':              '#38761d',
  'maxi':              '#ff9900',
  'grubery':           '#0000ff',
  'föcki92':           '#000000',
  'focki92':           '#000000',
  'penx':              '#ffff00',
  'joris':             '#ff00ff',
  'zlatan_giroudovic': '#9900ff',
  'marc/destroy':      '#6f3c06',
  'wildeslosti':       '#ff00ff',
  'dolermen':          '#9900ff',
  'dico':              '#6f3c06',
  'michi':             '#01ffff',
  'michi [bluemagic]': '#01ffff',
  'lukidunkel':        '#0000ff',
  'justin113_yt':      '#ffff00',
  'justinfch_1965':    '#ff9900',
  'craft':             '#38761d',
  'bvblars':           '#000000',
};

// Team-Datenbank (für Strafseite + Ergebnistabelle)
const TEAMS = {
  'brohogs racing':           { logo: 'https://i.postimg.cc/mZdpg8JH/BROHOGS-Logo-10-Jahre.png', f: '#b28448' },
  'hyper engine racing team': { logo: 'https://i.postimg.cc/bJNDFhp0/HERT-neu.png',              f: '#ff00ff' },
  'dragon force f1cc team':   { logo: 'https://i.imgur.com/m5bK6PY.png',                         f: '#9900ff' },
  'dragon force':             { logo: 'https://i.imgur.com/m5bK6PY.png',                         f: '#9900ff' },
  'infinity racing':          { logo: 'https://i.imgur.com/7SNUgPy.png',                          f: '#0536a4' },
  'pegasus racing':           { logo: 'https://i.imgur.com/Du2GByr.png',                          f: '#01ffff' },
  '2fastracing':              { logo: 'https://i.imgur.com/mZaHdQE.png',                          f: '#ff9900' },
  '2fast racing':             { logo: 'https://i.imgur.com/mZaHdQE.png',                          f: '#ff9900' },
  'undercover f1cc team':     { logo: 'https://i.imgur.com/wyzPR01.png',                          f: '#d4d400' },
  'undercover':               { logo: 'https://i.imgur.com/wyzPR01.png',                          f: '#d4d400' },
  'cobras squad racing':      { logo: 'https://i.postimg.cc/mgcYJr0w/COBRAS-SQUAD.png',           f: '#38761d' },
  'cobra squad racing':       { logo: 'https://i.postimg.cc/mgcYJr0w/COBRAS-SQUAD.png',           f: '#38761d' },
  'cobra squad':              { logo: 'https://i.postimg.cc/mgcYJr0w/COBRAS-SQUAD.png',           f: '#38761d' },
  'black bull racing':        { logo: 'https://i.imgur.com/D5pz4fV.png',                          f: '#ece5d0' },
};

function getTeam(name) {
  if (!name) return null;
  return TEAMS[name.trim().toLowerCase()] || null;
}

// Strafen-Text kürzen: "+3 Sekunden Strafe für Michi" → "+3s"
// Gibt leeren String zurück wenn keine Zeitstrafe erkennbar (z.B. "Rennsperre")
function kuerzeStrafe(text) {
  if (!text) return '';
  const m = text.match(/(\d+)\s*[Ss]ekunden?/);
  if (m) return `+${m[1]}s`;
  const m2 = text.match(/\+\s*(\d+)\s*s/i);
  if (m2) return `+${m2[1]}s`;
  // Kein Zeitmuster gefunden → keine Strafe im Ergebnis anzeigen
  return '';
}

async function fetchCSV(pubId, gid) {
  const url = `https://docs.google.com/spreadsheets/d/e/${pubId}/pub?gid=${gid}&single=true&output=csv&_=${Date.now()}`;
  const r = await fetch(url, { cache: 'no-store' });
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  return r.text();
}

function parseCSV(text) {
  const lines = text.trim().split('\n');
  return lines.map(line => {
    const cols = [];
    let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (c === '"') { inQ = !inQ; }
      else if (c === ',' && !inQ) { cols.push(cur.trim()); cur = ''; }
      else { cur += c; }
    }
    cols.push(cur.trim());
    return cols;
  });
}

function kopfHTML(einst) {
  return `
  <div class="kopf">
    <div class="kopf-logo"><img src="https://i.postimg.cc/5NS201WB/image.png" alt="F1CC"></div>
    <div class="kopf-mitte">
      <div class="kopf-gp">${einst.flagge} ${einst.gpName}</div>
      <div class="kopf-datum">${einst.renndatum}</div>
    </div>
    <div class="kopf-partner">
      <img src="https://i.postimg.cc/tgMHZSk4/EA-Logo.png" alt="EA">
      <img src="https://i.postimg.cc/x8VDLszj/FSL-Logo.png" alt="FSL">
    </div>
  </div>
  <div class="subband">Offizieller Komiteebericht</div>`;
}

function fussHTML(einst, dokNr) {
  return `
  <div class="fuss">
    <span>F1CC – Offizieller Komiteebericht</span>
    <span class="fuss-dok">DOK. ${dokNr} / ${einst.gpName} ${new Date().getFullYear()}</span>
    <span>Saisonrennen Nr. ${einst.rennnummer}</span>
  </div>`;
}

function buildStrafseite(einst, dok, fahrer, qrCounter) {
  const typ = (dok.urteilTyp || 'strafe').toLowerCase();
  const icon = typ === 'strafe' ? '⚠️' : typ === 'streichung' ? '✅' : 'ℹ️';

  // "An"-Feld: manuelles An aus Spalte B (erste Zeile) ODER alle Teams zusammenfassen
  const alleTeamsImFall = [...new Set(fahrer.map(f => f.team).filter(Boolean))];
  const anText = dok.an || (alleTeamsImFall.length > 0 ? alleTeamsImFall.join(' & ') : 'Alle Fahrer');

  // Mehrere Fahrer-Zeilen
  const fahrerNamen = fahrer.map((f, i) => `
    <div class="dz">
      <div class="dl">${i === 0 ? 'Fahrer' : ''}</div>
      <div class="dv bold">${f.fahrer}</div>
    </div>`).join('');

  const teamZeilen = fahrer.map((f, i) => {
    const team = getTeam(f.team);
    const teamHTML = team
      ? `<img src="${team.logo}" style="width:18px;height:18px;object-fit:contain"><span style="color:${team.f};font-weight:700">${f.team}</span>`
      : `<span style="color:#787f84">${f.team || '–'}</span>`;
    return `
    <div class="dz">
      <div class="dl">${i === 0 ? 'Team' : ''}</div>
      <div class="dv">${teamHTML}</div>
    </div>`;
  }).join('');

  // QR-Codes
  let qrHTML = '';
  const links = [dok.videoLink1, dok.videoLink2].filter(Boolean);
  const qrIds = [];
  if (links.length > 0) {
    qrHTML = `<div class="at">Beweise / Videos</div><div class="qr-outer">`;
    links.forEach((link, i) => {
      const qrId = `qr${qrCounter + i}`;
      qrIds.push({ id: qrId, url: link });
      qrHTML += `
      <div class="qr-wrap">
        <div class="qr-code-box" id="${qrId}"></div>
        <div class="qr-text">
          <div class="qr-label">Video-Beweis ${i + 1}</div>
          <div class="qr-link">${link}</div>
          <div class="qr-hint">QR-Code scannen um Video zu öffnen</div>
        </div>
      </div>`;
    });
    qrHTML += `</div>`;
  } else {
    qrHTML = `<div class="at">Beweise / Videos</div><div class="textbox" style="color:#444;font-style:italic">Keine Beweise eingereicht</div>`;
  }

  const html = `
<div class="seite">
  ${kopfHTML(einst)}
  <div class="meta">
    <div class="meta-links">
      <div class="meta-z"><span class="ml">Vom</span><span class="mv">Komitee</span></div>
      <div class="meta-z"><span class="ml">An</span><span class="mv bold">${anText}</span></div>
    </div>
    <div class="meta-rechts">
      <div class="meta-z"><span class="ml">Dokument</span><span class="mv bold">${dok.dokNr}</span></div>
      <div class="meta-z"><span class="ml">Datum</span><span class="mv">${dok.datum}</span></div>
      <div class="meta-z"><span class="ml">Uhrzeit</span><span class="mv">${dok.uhrzeit}</span></div>
    </div>
  </div>

  <div class="at">Vorfall</div>
  <div class="dtab">
    ${fahrerNamen}
    ${teamZeilen}
    <div class="dz"><div class="dl">Session</div><div class="dv">${dok.session || '–'}</div></div>
    <div class="dz"><div class="dl">Runde</div><div class="dv">${dok.runde || '–'}</div></div>
    <div class="dz"><div class="dl">Vergehen</div><div class="dv">${dok.vergehen || '–'}</div></div>
  </div>

  <div class="at">Urteil</div>
  <div class="urteil ${typ}">
    <div class="u-icon">${icon}</div>
    <div>
      <div class="u-label">Entscheidung des Komitees</div>
      <div class="u-text">${dok.urteilText}</div>
    </div>
  </div>

  <div class="at">Begründung</div>
  <div class="textbox">${dok.begruendung || '–'}</div>

  ${qrHTML}
  ${fussHTML(einst, dok.dokNr)}
</div>`;

  return { html, qrIds };
}

function buildErgebnisseite(einst, posAend, spielstrafen, komiteestrafen, ergebnisRows, letztesDokNr, uhrzeit) {

  const dokNr = parseInt(letztesDokNr) + 1;

  const metaHTML = `
  <div class="meta">
    <div class="meta-links">
      <div class="meta-z"><span class="ml">Vom</span><span class="mv">Komitee</span></div>
      <div class="meta-z"><span class="ml">An</span><span class="mv bold">Alle Fahrer</span></div>
    </div>
    <div class="meta-rechts">
      <div class="meta-z"><span class="ml">Dokument</span><span class="mv bold">${dokNr}</span></div>
      <div class="meta-z"><span class="ml">Datum</span><span class="mv">${einst.berichtDatum}</span></div>
      <div class="meta-z"><span class="ml">Uhrzeit</span><span class="mv">${uhrzeit}</span></div>
    </div>
  </div>`;

  const posKartenHTML = posAend.length > 0 ? `
  <div class="at">Positionsänderungen durch Komitee</div>
  <div class="pos-karten">
    ${posAend.map(p => `
    <div class="pos-karte ${p.typ}">
      <div class="pk-pfeil">${p.typ === 'abstieg' ? '↓' : '↑'}</div>
      <div class="pk-name">${p.fahrer}</div>
      <div class="pk-pos">
        <div class="pk-von">P${p.von}</div>
        <div class="pk-arrow">→</div>
        <div class="pk-nach">P${p.nach}</div>
      </div>
    </div>`).join('')}
  </div>` : '';

  // Maps
  const komMap = {};
  komiteestrafen.forEach(k => { komMap[k.fahrer.toLowerCase()] = k.strafe; });
  console.log('komMap:', komMap);
  const posUpMap = {}, posDownMap = {};
  posAend.forEach(p => {
    if (p.typ === 'aufstieg') posUpMap[p.fahrer.toLowerCase()] = true;
    if (p.typ === 'abstieg')  posDownMap[p.fahrer.toLowerCase()] = true;
  });
  const spielMap = {};
  spielstrafen.forEach(s => { spielMap[s.fahrer.toLowerCase()] = s; });

  const ergZeilen = ergebnisRows.map(row => {
    const fname  = row.fahrer || '';
    const fkey   = fname.toLowerCase();
    const farbe  = FAHRER_FARBEN[fkey] || '#787f84';
    const isUp   = !!posUpMap[fkey];
    const isDown = !!posDownMap[fkey];
    const isDNF  = !!(row.dnf && row.dnf.trim());
    const rowCls = isDNF ? 'dnf' : isUp ? 'up' : isDown ? 'down' : '';
    const pfeil  = isUp ? `<span class="pos-pfeil up">↑</span>` : isDown ? `<span class="pos-pfeil down">↓</span>` : '';

    const teamObj      = getTeam(row.team);
    const teamColor    = teamObj ? teamObj.f : '#787f84';
    const teamLogoHTML = teamObj ? `<img src="${teamObj.logo}" alt="">` : '';

    const kom = komMap[fkey];
    const sp  = spielMap[fkey];
    const parts = [];
    if (kom) parts.push(`<span class="st-komitee">${kom} ⚑</span>`);
    if (sp) {
      if (sp.status === 'gestrichen') parts.push(`<span class="st-gestrichen">${sp.strafe}</span>`);
      else if (sp.status === 'reduziert') parts.push(`<span class="st-reduziert"><span class="alt">${sp.strafe}</span><span class="neu">${sp.neu}</span></span>`);
      else parts.push(`<span class="st-spiel">${sp.strafe}</span>`);
    }
    const strafenInner = parts.length ? parts.join('&nbsp;') : '<span style="color:#333">–</span>';

    const flBadge  = row.fl  ? `<span class="ebadge eb-fl">FL</span>`       : '';
    const tsBadge  = row.ts  ? `<span class="ebadge eb-ts">${row.ts}</span>`: '';
    const fdtBadge = row.fdt ? `<span class="ebadge eb-fdt">FDT</span>`     : '';
    const müBadge  = row.müm ? `<span class="ebadge eb-müm">MÜM</span>`     : '';
    const sbfBadge = row.sbf ? `<span class="ebadge eb-sbf">SBF</span>`     : '';
    const dnfBadge = isDNF   ? `<span class="ebadge eb-dnf">DNF</span>`     : '';

    return `
    <div class="erg-cols erg-row ${rowCls}" style="padding-left:14px">
      <div class="estripe" style="background:${farbe}"></div>
      <div class="ep">${row.pos}</div>
      <div class="erg-fahrer-name" style="color:${farbe}">${fname}${pfeil}</div>
      <div class="erg-team-logo-cell">${teamLogoHTML ? `<img src="${teamObj.logo}" alt="">` : ''}</div>
      <div class="erg-team-name" style="color:${teamColor}">${row.team || 'Free Agent'}</div>
      <div class="ecell">${flBadge}</div>
      <div class="ecell">${tsBadge}</div>
      <div class="ecell">${fdtBadge}</div>
      <div class="ecell">${müBadge}</div>
      <div class="ecell">${sbfBadge}</div>
      <div class="strafen-cell">${strafenInner}</div>
      <div class="ecell">${dnfBadge}</div>
      <div class="epkt">${row.gesPkt} <span class="pl">PKT</span></div>
    </div>`;
  }).join('');

  const ergebnisTabHTML = `
  <div class="at">Endgültiges Rennergebnis</div>
  <div class="ergtab">
    <div class="erg-cols erg-head">
      <div style="text-align:center">P</div>
      <div style="padding-left:4px">Fahrer</div>
      <div></div>
      <div style="padding-left:3px">Team</div>
      <div style="text-align:center">FL</div>
      <div style="text-align:center">TS</div>
      <div style="text-align:center">FDT</div>
      <div style="text-align:center">MÜM</div>
      <div style="text-align:center">SBF</div>
      <div style="text-align:center">Strafen</div>
      <div style="text-align:center">DNF</div>
      <div style="text-align:right">PKT</div>
    </div>
    ${ergZeilen}
  </div>`;

  const einspruchHTML = `
  <div class="einspruch">
    Wenn es <strong>signifikante, neue Beweise/Beispiele</strong> gibt, darf gegen dieses Rennergebnis
    bis zum <strong>${einst.einspruchsfrist} 23:59 Uhr</strong> Einspruch eingelegt werden.
    Diese dürfen nur auf Grundlage von aktuell verfügbaren Regelwerken getätigt werden.
  </div>`;

  // Ab 4 Positionsänderungen: aufteilen auf 2 Seiten
  if (posAend.length >= 4) {
    return `
<div class="seite">
  ${kopfHTML(einst)}
  ${metaHTML}
  ${posKartenHTML}
  ${fussHTML(einst, dokNr)}
</div>
<div class="seitentrenn"></div>
<div class="seite">
  ${kopfHTML(einst)}
  ${ergebnisTabHTML}
  ${einspruchHTML}
  ${fussHTML(einst, dokNr)}
</div>`;
  }

  // Alles auf einer Seite
  return `
<div class="seite">
  ${kopfHTML(einst)}
  ${metaHTML}
  ${posKartenHTML}
  ${ergebnisTabHTML}
  ${einspruchHTML}
  ${fussHTML(einst, dokNr)}
</div>`;
}

// ERGEBNISSE PARSEN
// Sheets-Struktur: Zeile 1 = Header, Rennen 1 startet in Zeile 12 (Index 11 nach 0-basis, Index 10 nach Header-Skip)
// Rennen 2: Zeile 48 → Index 47 → nach Header-Skip: 46
// Formel: startIdx = (nr-1)*36 + 10  [nach 1 Header-Zeile abgezogen]
function parseErgebnisse(csv, rennnummer) {
  const rows = parseCSV(csv).slice(1); // Header überspringen
  const nr = parseInt(rennnummer);
  // Rennen 1: Sheets-Zeile 12 = Index 11, nach Header-Skip = Index 10
  // Rennen 2: Sheets-Zeile 48 = Index 47, nach Header-Skip = Index 46
  // → startIdx = (nr-1)*36 + 10
  const startIdx = (nr - 1) * 36 + 10;
  const block = rows.slice(startIdx, startIdx + 22); // 22 Fahrer

  const ergebnisse = [];
  block.forEach((r, i) => {
    const fahrer = (r[10] || '').trim(); // Spalte K
    if (!fahrer) return;
    ergebnisse.push({
      pos:    i + 1,
      fahrer: fahrer,
      team:   (r[11] || '').trim(), // Spalte L – Team
      fl:     (r[14] || '').trim(), // Spalte O – FL
      ts:     (r[15] || '').trim(), // Spalte P – TS
      fdt:    (r[16] || '').trim(), // Spalte Q – FDT
      müm:    (r[17] || '').trim(), // Spalte R – MÜM
      sbf:    (r[18] || '').trim(), // Spalte S – SBF
      dnf:    (r[19] || '').trim(), // Spalte T – DNF
      gesPkt: (r[21] || '0').trim(), // Spalte V – GES-PKT
    });
  });
  return ergebnisse;
}

async function main() {
  const ladeText   = document.getElementById('lade-text');
  const ladeFehler = document.getElementById('lade-fehler');

  try {
    ladeText.textContent = 'Daten laden …';
    const [csvEinst, csvFaelle, csvPos, csvSpiel, csvErg] = await Promise.all([
      fetchCSV(CFG.KOMITEE_PUB, CFG.GID_EINSTELLUNGEN),
      fetchCSV(CFG.KOMITEE_PUB, CFG.GID_FAELLE),
      fetchCSV(CFG.KOMITEE_PUB, CFG.GID_POSITIONSAEND),
      fetchCSV(CFG.KOMITEE_PUB, CFG.GID_SPIELSTRAFEN),
      fetchCSV(CFG.ERGEBNIS_PUB, CFG.GID_ERGEBNISSE),
    ]);

    ladeText.textContent = 'Verarbeiten …';

    // EINSTELLUNGEN (Zeile 2–7 in Sheets = Index 1–6 nach Header-Skip)
    const eRows = parseCSV(csvEinst).slice(1);
    const einst = {
      rennnummer:          (eRows[0]?.[1] || '').trim(),
      gpName:              (eRows[1]?.[1] || '').trim(),
      flagge:              (eRows[2]?.[1] || '').trim(),
      renndatum:           (eRows[3]?.[1] || '').trim(),
      einspruchsfrist:     (eRows[4]?.[1] || '').trim(),
      berichtDatum:        (eRows[5]?.[1] || '').trim(),
      ergebnisDokUhrzeit:  (eRows[6]?.[1] || '').trim(), // Zeile 7: Uhrzeit des Ergebnisdokuments
    };

    const fRows = parseCSV(csvFaelle).slice(1).filter(r => r[0]?.trim());
    const dokMap = new Map();
    fRows.forEach(r => {
      const nr = r[0].trim();
      if (!dokMap.has(nr)) {
        dokMap.set(nr, {
          dokNr:       nr,
          datum:       r[2]?.trim() || '',
          uhrzeit:     r[3]?.trim() || '',
          session:     r[6]?.trim() || '',
          runde:       r[7]?.trim() || '',
          vergehen:    r[8]?.trim() || '',
          urteilText:  r[9]?.trim() || '',
          urteilTyp:   r[10]?.trim() || 'strafe',
          begruendung: r[11]?.trim() || '',
          videoLink1:  r[12]?.trim() || '',
          videoLink2:  r[13]?.trim() || '',
          bestrafter:  r[14]?.trim() || '', // Spalte O – wer die Strafe bekommt
          fahrer: [],
          anTeams: [],
        });
      }
      // Falls bestrafter in einer späteren Zeile steht, auch übernehmen
      const bestrafterInZeile = r[14]?.trim() || '';
      if (bestrafterInZeile && !dokMap.get(nr).bestrafter) {
        dokMap.get(nr).bestrafter = bestrafterInZeile;
      }
      const fahrerName = r[4]?.trim();
      const teamName   = r[5]?.trim();
      if (fahrerName) {
        dokMap.get(nr).fahrer.push({ fahrer: fahrerName, team: teamName || '' });
      }
      if (teamName && !dokMap.get(nr).anTeams.includes(teamName)) {
        dokMap.get(nr).anTeams.push(teamName);
      }
    });
    // An-Feld aus gesammelten Teams setzen – untereinander statt mit &
    dokMap.forEach(dok => {
      dok.an = dok.anTeams.length > 0 ? dok.anTeams.join('<br>') : 'Alle Fahrer';
    });

    // POSITIONSÄNDERUNGEN
    const pRows = parseCSV(csvPos).slice(1).filter(r => r[0]?.trim());
    const posAend = pRows.map(r => ({
      fahrer: r[0].trim(),
      von:    r[1].trim(),
      nach:   r[2].trim(),
      typ:    r[3].trim().toLowerCase(),
    }));

    // SPIELSTRAFEN
    const sRows = parseCSV(csvSpiel).slice(1).filter(r => r[0]?.trim());
    const spielstrafen = sRows.map(r => ({
      fahrer: r[0].trim(),
      strafe: r[1].trim(),
      status: (r[2]?.trim() || 'aktiv').toLowerCase(),
      neu:    r[3]?.trim() || '',
    }));

    // KOMITEESTRAFEN – nur dem bestraften Fahrer zuordnen (Spalte O)
    const komiteestrafen = [];
    dokMap.forEach(dok => {
      const t = dok.urteilTyp.toLowerCase();
      if (t === 'strafe' || t === 'streichung') {
        const gekuerzt = kuerzeStrafe(dok.urteilText);
        if (gekuerzt && dok.bestrafter) {
          // Kommagetrennte Liste der bestraften Fahrer
          const liste = dok.bestrafter.split(',').map(s => s.trim().toLowerCase());
          liste.forEach(name => {
            if (name) komiteestrafen.push({ fahrer: name, strafe: gekuerzt });
          });
        }
      }
    });

    // UHRZEIT des letzten Fall-Dokuments für Ergebnisdokument
    const letzteNr = [...dokMap.keys()].sort((a, b) => parseInt(a) - parseInt(b)).at(-1) || '0';
    const letzteUhrzeit = dokMap.get(letzteNr)?.uhrzeit || '';

    const ergebnisRows = parseErgebnisse(csvErg, einst.rennnummer);

    // HTML AUFBAUEN
    ladeText.textContent = 'Seiten aufbauen …';
    let allHTML = '';
    const alleQrIds = [];
    let qrCounter = 1;

    const dokNrs = [...dokMap.keys()].sort((a, b) => parseInt(a) - parseInt(b));
    dokNrs.forEach((nr, i) => {
      const dok = dokMap.get(nr);
      if (i > 0) allHTML += '<div class="seitentrenn"></div>';
      const { html, qrIds } = buildStrafseite(einst, dok, dok.fahrer, qrCounter);
      allHTML += html;
      alleQrIds.push(...qrIds);
      qrCounter += qrIds.length;
    });

    allHTML += '<div class="seitentrenn"></div>';
    allHTML += buildErgebnisseite(einst, posAend, spielstrafen, komiteestrafen, ergebnisRows, letzteNr, letzteUhrzeit);

    document.getElementById('inhalt').innerHTML = allHTML;

    // QR generieren
    ladeText.textContent = 'QR-Codes generieren …';
    alleQrIds.forEach(({ id, url }) => {
      const el = document.getElementById(id);
      if (el && url) new QRCode(el, { text: url, width: 64, height: 64, colorDark: '#000000', colorLight: '#ffffff', correctLevel: QRCode.CorrectLevel.M });
    });

    document.getElementById('ladescreen').style.display = 'none';

  } catch (err) {
    ladeFehler.style.display = 'block';
    ladeFehler.textContent = `Fehler: ${err.message}`;
    ladeText.textContent = 'Laden fehlgeschlagen';
    console.error(err);
  }
}

main();
</script>
